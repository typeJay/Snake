<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            padding: 20px;
        }
        
        .game-container {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
            padding: 25px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #4CAF50;
            margin-bottom: 15px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        
        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: rgba(30, 30, 30, 0.9);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
        }
        
        #score {
            font-size: 1.8rem;
            font-weight: bold;
            color: #FFD700;
        }
        
        #high-score {
            font-size: 1.2rem;
            color: #FFA500;
        }
        
        .game-board {
            background-color: #0a1a2a;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            margin: 0 auto;
            display: block;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        button {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(to bottom, #66BB6A, #388E3C);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        #pause-btn {
            background: linear-gradient(to bottom, #2196F3, #0D47A1);
        }
        
        #pause-btn:hover {
            background: linear-gradient(to bottom, #42A5F5, #1565C0);
        }
        
        .instructions {
            margin-top: 20px;
            color: #ddd;
            background: rgba(30, 30, 30, 0.7);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .instructions h2 {
            color: #4CAF50;
            margin-bottom: 10px;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 10;
            border: 2px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
        
        .game-over h2 {
            color: #ff3333;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .game-over p {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 25px;
        }
        
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        
        .mobile-controls button {
            padding: 15px;
            font-size: 1.5rem;
        }
        
        .up-btn { grid-column: 2; grid-row: 1; }
        .left-btn { grid-column: 1; grid-row: 2; }
        .right-btn { grid-column: 3; grid-row: 2; }
        .down-btn { grid-column: 2; grid-row: 2; }
        
        @media (max-width: 500px) {
            .mobile-controls {
                display: grid;
            }
            
            .game-container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 Snake Game</h1>
        
        <div class="game-info">
            <div>Score: <span id="score">0</span></div>
            <div>High Score: <span id="high-score">0</span></div>
        </div>
        
        <canvas id="game-board" class="game-board" width="400" height="400"></canvas>
        
        <div class="controls">
            <button id="start-btn">Start Game</button>
            <button id="pause-btn">Pause</button>
            <button id="reset-btn">Reset</button>
        </div>
        
        <div class="mobile-controls">
            <button class="up-btn">↑</button>
            <button class="left-btn">←</button>
            <button class="right-btn">→</button>
            <button class="down-btn">↓</button>
        </div>
        
        <div class="instructions">
            <h2>How to Play</h2>
            <p>Use arrow keys to control the snake. Eat the food (red) to grow and earn points. Avoid hitting the walls or yourself!</p>
        </div>
    </div>
    
    <div class="game-over" id="game-over">
        <h2>Game Over!</h2>
        <p>Your score: <span id="final-score">0</span></p>
        <button id="restart-btn">Play Again</button>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('high-score');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        
        // Mobile controls
        const upBtn = document.querySelector('.up-btn');
        const downBtn = document.querySelector('.down-btn');
        const leftBtn = document.querySelector('.left-btn');
        const rightBtn = document.querySelector('.right-btn');
        
        // Game settings
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let speed = 12;
        
        // Game state
        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gameLoop;
        
        // Initialize game
        function initGame() {
            // Reset snake
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            
            // Reset direction
            dx = 1;
            dy = 0;
            
            // Reset score
            score = 0;
            scoreDisplay.textContent = score;
            highScoreDisplay.textContent = highScore;
            
            // Generate first food
            generateFood();
            
            // Hide game over screen
            gameOverScreen.style.display = 'none';
        }
        
        // Generate food at random position
        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            // Make sure food doesn't appear on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }
        
        // Draw game elements
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a1a2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#0d2b45';
            for (let i = 0; i < tileCount; i++) {
                for (let j = 0; j < tileCount; j++) {
                    ctx.strokeRect(i * gridSize, j * gridSize, gridSize, gridSize);
                }
            }
            
            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Draw head with different color
                    ctx.fillStyle = '#4CAF50';
                } else {
                    // Draw body with gradient
                    const gradient = ctx.createLinearGradient(
                        segment.x * gridSize, 
                        segment.y * gridSize, 
                        segment.x * gridSize + gridSize, 
                        segment.y * gridSize + gridSize
                    );
                    gradient.addColorStop(0, '#2E7D32');
                    gradient.addColorStop(1, '#1B5E20');
                    ctx.fillStyle = gradient;
                }
                
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                
                // Add border to segments
                ctx.strokeStyle = '#0d2b45';
                ctx.strokeRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
            });
            
            // Draw food
            ctx.fillStyle = '#FF5252';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2, 
                food.y * gridSize + gridSize/2, 
                gridSize/2, 
                0, 
                Math.PI * 2
            );
            ctx.fill();
            
            // Add shine to food
            ctx.fillStyle = '#FF9E9E';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/3, 
                food.y * gridSize + gridSize/3, 
                gridSize/6, 
                0, 
                Math.PI * 2
            );
            ctx.fill();
        }
        
        // Move snake
        function move() {
            // Create new head
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Add new head to beginning of snake
            snake.unshift(head);
            
            // Check if food is eaten
            if (head.x === food.x && head.y === food.y) {
                // Increase score
                score += 10;
                scoreDisplay.textContent = score;
                
                // Generate new food
                generateFood();
                
                // Increase speed slightly
                if (speed > 5) {
                    speed -= 0.2;
                }
            } else {
                // Remove tail if no food eaten
                snake.pop();
            }
        }
        
        // Check for collisions
        function checkCollision() {
            const head = snake[0];
            
            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }
            
            // Check self collision (skip head)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            
            return false;
        }
        
        // Game loop
        function gameUpdate() {
            if (!gameRunning) return;
            
            move();
            
            if (checkCollision()) {
                gameOver();
                return;
            }
            
            draw();
        }
        
        // Start game
        function startGame() {
            if (gameRunning) return;
            
            initGame();
            gameRunning = true;
            startBtn.textContent = "Restart";
            
            // Start game loop
            clearInterval(gameLoop);
            gameLoop = setInterval(gameUpdate, 1000 / speed);
        }
        
        // Pause game
        function pauseGame() {
            gameRunning = !gameRunning;
            pauseBtn.textContent = gameRunning ? "Pause" : "Resume";
        }
        
        // Reset game
        function resetGame() {
            clearInterval(gameLoop);
            gameRunning = false;
            startBtn.textContent = "Start Game";
            initGame();
            draw();
        }
        
        // Game over
        function gameOver() {
            clearInterval(gameLoop);
            gameRunning = false;
            
            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }
            
            // Show game over screen
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'block';
        }
        
        // Handle keyboard input
        function handleKeydown(e) {
            // Prevent arrow keys from scrolling the page
            if ([37, 38, 39, 40].includes(e.keyCode)) {
                e.preventDefault();
            }
            
            // Only change direction if game is running
            if (!gameRunning) return;
            
            // Left arrow
            if (e.keyCode === 37 && dx === 0) {
                dx = -1;
                dy = 0;
            }
            // Up arrow
            else if (e.keyCode === 38 && dy === 0) {
                dx = 0;
                dy = -1;
            }
            // Right arrow
            else if (e.keyCode === 39 && dx === 0) {
                dx = 1;
                dy = 0;
            }
            // Down arrow
            else if (e.keyCode === 40 && dy === 0) {
                dx = 0;
                dy = 1;
            }
        }
        
        // Event listeners
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', pauseGame);
        resetBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('click', startGame);
        
        document.addEventListener('keydown', handleKeydown);
        
        // Mobile controls
        upBtn.addEventListener('click', () => { if (dy === 0) { dx = 0; dy = -1; } });
        downBtn.addEventListener('click', () => { if (dy === 0) { dx = 0; dy = 1; } });
        leftBtn.addEventListener('click', () => { if (dx === 0) { dx = -1; dy = 0; } });
        rightBtn.addEventListener('click', () => { if (dx === 0) { dx = 1; dy = 0; } });
        
        // Initialize the game
        initGame();
        draw();
    </script>
</body>
</html>
